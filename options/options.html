<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>QuickNav 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <header class="header">
      <div class="title">QuickNav 设置</div>
      <div class="subtitle">在这里控制 QuickNav 在哪些网站启用。</div>
    </header>

    <main class="main">
      <section class="card">
        <div class="cardTitle">总开关</div>
        <label class="toggle">
          <input type="checkbox" id="enabled" />
          <span>启用 QuickNav</span>
        </label>
        <div class="hint">关闭后需要刷新页面，才能完全移除已注入的面板。</div>
      </section>

      <section class="card">
        <div class="cardTitle">网站</div>
        <div class="siteGrid">
          <div class="siteItem">
            <label class="siteMain"><input type="checkbox" id="site_chatgpt" /><span>ChatGPT（chatgpt.com）</span></label>
            <label class="siteSub"><input type="checkbox" id="lock_chatgpt" /><span>默认 🔐（防自动滚动）</span></label>
          </div>
          <div class="siteItem">
            <label class="siteMain"><input type="checkbox" id="site_ernie" /><span>文心一言（ernie.baidu.com）</span></label>
            <label class="siteSub"><input type="checkbox" id="lock_ernie" /><span>默认 🔐（防自动滚动）</span></label>
          </div>
          <div class="siteItem">
            <label class="siteMain"><input type="checkbox" id="site_deepseek" /><span>DeepSeek（chat.deepseek.com）</span></label>
            <label class="siteSub"><input type="checkbox" id="lock_deepseek" /><span>默认 🔐（防自动滚动）</span></label>
          </div>
          <div class="siteItem">
            <label class="siteMain"><input type="checkbox" id="site_qwen" /><span>Qwen（chat.qwen.ai）</span></label>
            <label class="siteSub"><input type="checkbox" id="lock_qwen" /><span>默认 🔐（防自动滚动）</span></label>
          </div>
          <div class="siteItem">
            <label class="siteMain"><input type="checkbox" id="site_zai" /><span>GLM（chat.z.ai）</span></label>
            <label class="siteSub"><input type="checkbox" id="lock_zai" /><span>默认 🔐（防自动滚动）</span></label>
          </div>
          <div class="siteItem">
            <label class="siteMain"><input type="checkbox" id="site_grok" /><span>Grok（grok.com）</span></label>
            <label class="siteSub"><input type="checkbox" id="lock_grok" /><span>默认 🔐（防自动滚动）</span></label>
          </div>
          <div class="siteItem">
            <label class="siteMain"><input type="checkbox" id="site_gemini_app" /><span>Gemini App（gemini.google.com/app）</span></label>
            <label class="siteSub"><input type="checkbox" id="lock_gemini_app" /><span>默认 🔐（防自动滚动）</span></label>
          </div>
          <div class="siteItem">
            <label class="siteMain"><input type="checkbox" id="site_gemini_business" /><span>Gemini Business（business.gemini.google）</span></label>
            <label class="siteSub"><input type="checkbox" id="lock_gemini_business" /><span>默认 🔐（防自动滚动）</span></label>
          </div>
          <div class="siteItem">
            <label class="siteMain"><input type="checkbox" id="site_genspark" /><span>Genspark（genspark.ai/agents）</span></label>
            <label class="siteSub"><input type="checkbox" id="lock_genspark" /><span>默认 🔐（防自动滚动）</span></label>
          </div>
        </div>
        <div class="hint">“默认 🔐”仅在该网站从未保存过 🔐 状态时生效（例如第一次使用，或清除该网站数据后）。</div>
      </section>

      <section class="actions">
        <button class="btn secondary" id="restoreDefault" type="button">恢复默认</button>
        <button class="btn" id="reinjectNow" type="button">重新注入已打开页面</button>
        <button class="btn secondary" id="openRepo" type="button">仓库链接</button>
      </section>

      <div class="status" id="status" role="status" aria-live="polite"></div>
    </main>

    <script src="./options.js"></script>
  </body>
</html>
