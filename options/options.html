<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ai chat 扩展合集 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <header class="header">
      <div class="title">ai chat 扩展合集 设置</div>
      <div class="subtitle">在这里控制各网站与各模块的启用状态。</div>
    </header>

    <main class="main">
      <section class="card">
        <div class="cardTitle">总开关</div>
        <label class="toggle">
          <input type="checkbox" id="enabled" />
          <span>启用扩展（所有模块）</span>
        </label>
        <div class="hint">关闭后需要刷新页面，才能完全移除已注入的内容。</div>
      </section>

      <section class="card">
        <div class="cardTitle">配置</div>
        <div class="triGrid" role="group" aria-label="页面、脚本与脚本设置">
          <div class="triCol" aria-label="页面">
            <div class="triTitle">页面</div>
            <input class="triSearch" id="siteSearch" type="search" placeholder="搜索页面…" />
            <div class="triList" id="siteList"></div>
          </div>
          <div class="triCol" aria-label="脚本">
            <div class="triTitle">脚本</div>
            <input class="triSearch" id="moduleSearch" type="search" placeholder="搜索脚本…" />
            <div class="triList" id="moduleList"></div>
          </div>
          <div class="triCol" aria-label="脚本设置">
            <div class="triTitle">设置</div>
            <div class="triPanel" id="moduleSettings"></div>
          </div>
        </div>
        <div class="hint">提示：关闭某个模块后，已打开页面一般需要刷新才会完全停用。</div>
      </section>

      <section class="actions">
        <button class="btn secondary" id="restoreDefault" type="button">恢复默认</button>
        <button class="btn" id="reinjectNow" type="button">重新注入已打开页面</button>
        <button class="btn secondary" id="openRepo" type="button">仓库链接</button>
      </section>

      <div class="status" id="status" role="status" aria-live="polite"></div>
    </main>

    <script src="../shared/registry.js"></script>
    <script src="./options.js"></script>
  </body>
</html>
