<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuickNav Split</title>
    <link rel="stylesheet" href="panelize.css" />
  </head>
  <body>
    <div id="qn-panelize-root">
      <header id="qn-panelize-toolbar">
        <div class="qn-panelize-title">QuickNav Split</div>
        <div class="qn-panelize-actions">
          <button id="qn-panelize-reload-left" type="button" title="Reload left">L⟳</button>
          <button id="qn-panelize-reload-right" type="button" title="Reload right">R⟳</button>
          <button id="qn-panelize-close" type="button" title="Close">✕</button>
        </div>
      </header>

      <main id="qn-panelize-grid">
        <section class="qn-panelize-panel" id="qn-panelize-left-panel">
          <div class="qn-panelize-loading" id="qn-panelize-left-loading">Loading…</div>
          <iframe
            id="qn-split-iframe-left"
            title="ChatGPT Left"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"
            allow="clipboard-read; clipboard-write"
            loading="eager"
          ></iframe>
        </section>

        <div id="qn-panelize-divider" role="separator" aria-orientation="vertical" tabindex="0"></div>

        <section class="qn-panelize-panel" id="qn-panelize-right-panel">
          <div class="qn-panelize-loading" id="qn-panelize-right-loading">Loading…</div>
          <iframe
            id="qn-split-iframe-right"
            title="ChatGPT Right"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"
            allow="clipboard-read; clipboard-write"
            loading="eager"
          ></iframe>
        </section>
      </main>
    </div>

    <script src="panelize.js"></script>
  </body>
</html>
