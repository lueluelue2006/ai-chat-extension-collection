<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>QuickNav</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="title">QuickNav</div>
      <div class="meta">
        <div class="row"><span class="k">作者</span><span class="v" id="author"></span></div>
        <div class="row"><span class="k">版本</span><span class="v" id="version"></span></div>
      </div>
    </header>

    <main class="main">
      <div class="actions">
        <button class="btn" id="checkUpdate" type="button">检查更新</button>
        <button class="btn secondary" id="openRepo" type="button">仓库链接</button>
      </div>
      <div class="actions">
        <button class="btn secondary" id="openOptions" type="button">配置</button>
      </div>

      <section class="card" id="siteCard" aria-label="当前页面脚本">
        <div class="cardTitle">当前页面</div>
        <div class="siteMeta">
          <div class="siteName" id="siteName">未检测</div>
          <div class="siteUrl" id="siteUrl"></div>
        </div>
        <div class="toggleList" id="toggleList"></div>
        <div class="hint">提示：关闭某个模块后，已打开页面一般需要刷新才会完全停用。</div>
      </section>

      <section class="card" id="menuCard" aria-label="脚本菜单">
        <div class="cardTitle">菜单</div>
        <div class="menuList" id="menuList"></div>
        <div class="hint" id="menuHint">如果这里为空，通常是该页面还没注入脚本；试试刷新页面或在“配置”里开启对应模块。</div>
      </section>

      <div class="status" id="status" role="status" aria-live="polite"></div>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
